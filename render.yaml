services:
  - type: web
    name: aibuildcare-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: AIBUILDCARE_ENVIRONMENT
        value: production
      - key: AIBUILDCARE_DATABASE_URL
        value: ./data/complaints.db
      - key: AIBUILDCARE_JWT_SECRET
        generateValue: true
      - key: AIBUILDCARE_ANTHROPIC_API_KEY
        sync: false
      - key: AIBUILDCARE_TWILIO_ACCOUNT_SID
        sync: false
      - key: AIBUILDCARE_TWILIO_AUTH_TOKEN
        sync: false
      - key: AIBUILDCARE_SENDGRID_API_KEY
        sync: false

  - type: web
    name: aibuildcare-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE
        sync: false
